<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleSlate</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Top Menu Bar -->
    <header class="top-menu">
        <div class="menu-group">
            <div class="dropdown">
                <button class="menu-btn">File</button>
                <div class="dropdown-content">
                    <button id="btn-load">Load .slate</button>
                    <button id="btn-save">Save .slate</button>
                    <button id="btn-export-pdf">Export PDF</button>
                    <hr>
                    <button id="btn-title-page">Title Page Settings</button>
                </div>
            </div>
        </div>
        <div class="menu-status">
            <span id="page-estimate">Pages: 0 | Runtime: 0m</span>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="workspace">
        <section class="canvas-container" id="canvas-container">
            <div id="script-canvas" class="script-canvas">
                <!-- Blocks inject here -->
            </div>
            <!-- The Add Block Zone -->
            <div id="add-block-zone" class="add-block-zone" placeholder="Type here and hit Enter to add a block..."></div>
        </section>
    </main>

    <!-- Manual Formatting Toolbar -->
    <footer class="format-toolbar">
        <button class="fmt-btn" data-format="scene">Scene</button>
        <button class="fmt-btn" data-format="action">Action</button>
        <button class="fmt-btn" data-format="character">Character</button>
        <button class="fmt-btn" data-format="dialogue">Dialogue</button>
        <button class="fmt-btn" data-format="parenthetical">Parenthetical</button>
        <button class="fmt-btn" data-format="transition">Transition</button>
        <button class="fmt-btn" data-format="shot">Shot</button>
    </footer>

    <!-- Title Page Modal -->
    <div id="modal-title-page" class="modal hidden">
        <div class="modal-content">
            <h2>Title Page Configuration</h2>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="tp-title">
            </div>
            <div class="form-group">
                <label>Written by</label>
                <input type="text" id="tp-author">
            </div>
            <div class="form-group">
                <label>Contact Info</label>
                <textarea id="tp-contact" rows="4"></textarea>
            </div>
            <div class="modal-actions">
                <button id="btn-close-modal" class="btn">Cancel</button>
                <button id="btn-save-title" class="btn invert">Save</button>
            </div>
        </div>
    </div>

    <script src="js/formatter.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
